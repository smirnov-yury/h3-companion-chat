<!doctype html>
<html lang="ru" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>H3 Master — Companion for Heroes of Might &amp; Magic III: The Board Game</title>
    <meta name="description" content="H3 Master — unofficial companion app for Heroes of Might &amp; Magic III: The Board Game. Rules, scenarios, units, heroes, spells, artifacts. Offline-ready PWA." />

    <!-- Favicons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- Windows tiles -->
    <meta name="msapplication-TileColor" content="#F0E5D2" />
    <meta name="msapplication-TileImage" content="/mstile-150x150.png" />

    <!-- Theme color (light + dark via prefers-color-scheme) -->
    <meta name="theme-color" content="#7B3618" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#E8B147" media="(prefers-color-scheme: dark)" />

    <!-- PWA manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Fonts (existing) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=PT+Serif:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">

    <!-- Initial theme bootstrap (existing) -->
    <script>
      (function() {
        var t = localStorage.getItem('theme');
        if (t === 'light') { document.documentElement.classList.remove('dark'); }
        else { document.documentElement.classList.add('dark'); }
      })();
    </script>

    <!-- Google Consent Mode v2 default (denied until user opts in) -->
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){window.dataLayer.push(arguments);}
      window.gtag = gtag;
      gtag('consent', 'default', {
        ad_storage: 'denied',
        ad_user_data: 'denied',
        ad_personalization: 'denied',
        analytics_storage: 'denied',
        functionality_storage: 'granted',
        security_storage: 'granted',
        wait_for_update: 500
      });
    </script>

    <!-- Open Graph / Twitter Card -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://h3master.app" />
    <meta property="og:title" content="H3 Master — Companion for Heroes of Might &amp; Magic III: The Board Game" />
    <meta property="og:description" content="Unofficial companion app for Heroes of Might &amp; Magic III: The Board Game. Rules, scenarios, units, heroes, spells, artifacts. Offline-ready PWA." />
    <meta property="og:image" content="https://h3master.app/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="H3 Master" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="H3 Master — Companion for Heroes of Might &amp; Magic III: The Board Game" />
    <meta name="twitter:description" content="Unofficial companion app for Heroes of Might &amp; Magic III: The Board Game. Rules, scenarios, units, heroes, spells, artifacts. Offline-ready PWA." />
    <meta name="twitter:image" content="https://h3master.app/og-image.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
